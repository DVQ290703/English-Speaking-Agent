server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Proxy all /api/ traffic to the backend container (docker-compose only).
    # In K8s, the GCP LB routes /api/* to the backend service before nginx sees it,
    # so this block is never reached in production.
    # Using a variable for proxy_pass defers DNS resolution to request time,
    # so nginx starts cleanly even when "backend" is not resolvable (e.g. K8s).
    resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;
    set $backend_upstream http://backend-agent-service.english-speaking-agent.svc.cluster.local:8000;

    location /api/ {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Audio uploads can be up to 25 MB; default nginx limit is 1 MB.
        client_max_body_size 26m;
        proxy_read_timeout   60s;
        proxy_send_timeout   60s;
    }

    # Cache static assets aggressively, never cache HTML
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
