server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Proxy /api/ traffic to the backend.
    # docker-compose: "backend" resolves via Docker DNS to the backend service.
    # K8s: this block is never reached — the GKE Ingress routes /api/* directly
    #      to backend-agent-service before the request arrives at this nginx pod.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Audio uploads can be up to 25 MB; default nginx limit is 1 MB.
        client_max_body_size 26m;
        proxy_read_timeout   60s;
        proxy_send_timeout   60s;
    }

    # Cache static assets aggressively, never cache HTML
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}