# =============================================================================
# Prometheus Deployment — English Speaking Agent
# Apply  : kubectl apply -f deployments/prometheus/deploy.yaml
# Status : kubectl get pods -l app=prometheus -n english-speaking-agent
#
# Scrapes the backend /metrics endpoint (prometheus_fastapi_instrumentator +
# custom counters/histograms in app/core/metrics.py).
# =============================================================================

# ── ConfigMap — scrape config ─────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: english-speaking-agent
  labels:
    app: prometheus
    tier: monitoring
    project: english-speaking-agent
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: voice_agent_backend
        static_configs:
          - targets: ["backend-agent-service:8000"]
        metrics_path: /metrics

---

# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: english-speaking-agent
  labels:
    app: prometheus
    tier: monitoring
    project: english-speaking-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
      tier: monitoring
  template:
    metadata:
      labels:
        app: prometheus
        tier: monitoring
        project: english-speaking-agent
    spec:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      securityContext:
        fsGroup: 65534   # nobody — required for Prometheus to write to the volume

      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"

          ports:
            - name: http
              containerPort: 9090
              protocol: TCP

          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534   # nobody

      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}

---

# ── Service ───────────────────────────────────────────────────────────────────
# ClusterIP: Grafana reaches Prometheus via this DNS name:
#   http://prometheus-service.english-speaking-agent.svc.cluster.local:9090
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: english-speaking-agent
  labels:
    app: prometheus
    tier: monitoring
    project: english-speaking-agent
spec:
  type: ClusterIP
  selector:
    app: prometheus
    tier: monitoring
  ports:
    - name: http
      protocol: TCP
      port: 9090
      targetPort: http
