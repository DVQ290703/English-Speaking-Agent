# =============================================================================
# Redis Deployment — English Speaking Agent
# Apply  : kubectl apply -f deployments/redis/redis.yaml
# Status : kubectl get pods -l app=redis -n english-speaking-agent
#
# Single-replica Redis for rate limiting (guardrails).
# Data loss on pod restart is acceptable — rate limit counters are ephemeral.
# For persistence, add a PVC and --appendonly yes to the command.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: english-speaking-agent
  labels:
    app: redis
    tier: cache
    project: english-speaking-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        tier: cache
        project: english-speaking-agent
    spec:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
# 
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999   # redis user in redis:alpine

---

apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: english-speaking-agent
  labels:
    app: redis
    tier: cache
    project: english-speaking-agent
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
