# =============================================================================
# Vector DaemonSet — English Speaking Agent
# Apply  : kubectl apply -f deployments/vector/deploy.yaml
# Status : kubectl get pods -l app=vector -n english-speaking-agent
#
# Pre-requisite secret (create once, never commit):
#   kubectl create secret generic vector-es-secret \
#     --from-literal=password="<elastic_password>" \
#     --from-file=http_ca.crt=./http_ca.crt \
#     -n english-speaking-agent
#
# Collects stdout/stderr from backend-agent pods via kubernetes_logs source.
# Routes to 3 Elasticsearch data streams: audit, spans, plain.
# Elasticsearch: https://3.26.193.122:9200 (public IP, TLS + basic auth)
# =============================================================================

# ── ServiceAccount ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
  namespace: english-speaking-agent
  labels:
    app: vector
    tier: monitoring
    project: english-speaking-agent

---

# ── ClusterRole ───────────────────────────────────────────────────────────────
# kubernetes_logs source calls /api/v1/pods, /api/v1/namespaces, /api/v1/nodes
# to enrich log events with K8s metadata. ClusterRole (not Role) is required
# because nodes and namespaces are cluster-scoped resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector-cluster-role
  labels:
    app: vector
    tier: monitoring
    project: english-speaking-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]

---

# ── ClusterRoleBinding ────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector-cluster-role-binding
  labels:
    app: vector
    tier: monitoring
    project: english-speaking-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector-cluster-role
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: english-speaking-agent

---

# ── ConfigMap — vector config ─────────────────────────────────────────────────
# K8s-specific config. The Docker Compose version (deployments/vector/vector.yaml)
# is kept unchanged and continues to use the file source + local ES endpoint.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: english-speaking-agent
  labels:
    app: vector
    tier: monitoring
    project: english-speaking-agent
data:
  vector.yaml: |
    data_dir: ${VECTOR_DATA_DIR:-/var/lib/vector}

    sources:
      app_logs:
        type: kubernetes_logs
        self_node_name: "${VECTOR_SELF_NODE_NAME}"
        # Filter to backend pods in this namespace only.
        # Path pattern on node: /var/log/pods/<namespace>_<pod-name>_<pod-uid>/<container>/<n>.log
        include_paths_glob_patterns:
          - "/var/log/pods/english-speaking-agent_backend-agent-*/**/*.log"

    transforms:
      extract_prefix:
        type: remap
        inputs:
          - app_logs
        source: |
          parsed, err = parse_regex(.message, r'^(?P<ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (?P<level>\S+)\s+\[(?P<logger>[^\]]+)\] \[(?P<python_file>[^\]]+)\]:\s+(?P<payload>.+)$')
          if err == null {
            ts, ts_err = parse_timestamp(parsed.ts, "%Y-%m-%d %H:%M:%S")
            if ts_err == null {
              .@timestamp = ts
            }
            .level = parsed.level
            .logger = parsed.logger
            .python_file = parsed.python_file
            .payload = parsed.payload
          } else {
            .payload = .message
          }

      parse_payload:
        type: remap
        inputs:
          - extract_prefix
        source: |
          json_payload, json_err = parse_json(.payload)
          if json_err == null && is_object(json_payload) {
            merged, merge_err = merge(., json_payload)
            if merge_err == null {
              . = merged
              .log_type = "span"
            } else {
              .parse_error = true
              .log_type = "plain"
            }
            if exists(.timestamp) {
              ts, ts_err = parse_timestamp(.timestamp, "%+")
              if ts_err == null {
                .@timestamp = ts
              }
              del(.timestamp)
            }
          } else {
            .raw_message = .payload
            .log_type = "plain"
          }
          del(.payload)
          .source_file = .file

      drop_noise:
        type: filter
        inputs:
          - parse_payload
        condition: |
          msg = string(.raw_message) ?? ""
          path = string(.path) ?? ""
          !(contains(msg, "/health") || contains(msg, "/healthz") || contains(msg, "/readyz") || contains(msg, "/livez") || contains(msg, "/metrics") || contains(path, "/health") || contains(path, "/healthz") || contains(path, "/readyz") || contains(path, "/livez") || contains(path, "/metrics"))

      strip_k8s_noise:
        type: remap
        inputs:
          - drop_noise
        source: |
          del(.kubernetes.node_labels)
          del(.kubernetes.namespace_labels)
          del(.kubernetes.pod_annotations)
          del(.kubernetes.pod_ip)
          del(.kubernetes.pod_ips)
          del(.kubernetes.pod_uid)
          del(.kubernetes.pod_owner)
          del(.kubernetes.container_id)
          del(.kubernetes.container_image_id)
          del(.kubernetes.container_image)
          del(.kubernetes.container_name)
          del(.kubernetes.pod_labels)
          del(.kubernetes.pod_node_name)
          del(.message)
          del(.stream)
          del(.source_file)
          del(.file)
          del(.host)
          del(.source_type)

      route_by_category:
        type: route
        inputs:
          - strip_k8s_noise
        route:
          audit: exists(.event_type)
          span: .log_type == "span" && !exists(.event_type)
          plain: .log_type == "plain"

    sinks:
      elasticsearch_audit:
        type: elasticsearch
        inputs:
          - route_by_category.audit
        endpoints:
          - https://3.26.193.122:9200
        api_version: v8
        mode: data_stream
        data_stream:
          type: logs
          dataset: voice_agent.audit
          namespace: default
        tls:
          ca_file: /etc/vector/certs/http_ca.crt
          verify_hostname: false
        auth:
          strategy: basic
          user: "elastic"
          password: "${ELASTICSEARCH_PASSWORD}"

      elasticsearch_spans:
        type: elasticsearch
        inputs:
          - route_by_category.span
        endpoints:
          - https://3.26.193.122:9200
        api_version: v8
        mode: data_stream
        data_stream:
          type: logs
          dataset: voice_agent.spans
          namespace: default
        tls:
          ca_file: /etc/vector/certs/http_ca.crt
          verify_hostname: false
        auth:
          strategy: basic
          user: "elastic"
          password: "${ELASTICSEARCH_PASSWORD}"

      elasticsearch_plain:
        type: elasticsearch
        inputs:
          - route_by_category.plain
        endpoints:
          - https://3.26.193.122:9200
        api_version: v8
        mode: data_stream
        data_stream:
          type: logs
          dataset: voice_agent.plain
          namespace: default
        tls:
          ca_file: /etc/vector/certs/http_ca.crt
          verify_hostname: false
        auth:
          strategy: basic
          user: "elastic"
          password: "${ELASTICSEARCH_PASSWORD}"

---

# ── DaemonSet ─────────────────────────────────────────────────────────────────
# One Vector pod per node. Mounts /var/log/pods (read-only) to access pod
# stdout/stderr logs written by the container runtime.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: english-speaking-agent
  labels:
    app: vector
    tier: monitoring
    project: english-speaking-agent
spec:
  selector:
    matchLabels:
      app: vector
      tier: monitoring

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

  template:
    metadata:
      labels:
        app: vector
        tier: monitoring
        project: english-speaking-agent
    spec:
      serviceAccountName: vector

      # Allow scheduling on control-plane nodes (single-node/dev clusters).
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: vector
          image: timberio/vector:0.38.0-alpine
          args:
            - "--config"
            - "/etc/vector/vector.yaml"

          env:
            # Injected via downward API so kubernetes_logs knows which node it's on.
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # ES password — injected into auth.password in each sink via basic auth.
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vector-es-secret
                  key: password
          volumeMounts:
            # Host pod log directory — read-only, kubernetes_logs source reads here.
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            # Persistent checkpoint storage — survives pod restarts so Vector
            # resumes reading from where it left off.
            - name: vector-data
              mountPath: /var/lib/vector
            # Vector config from ConfigMap.
            - name: config
              mountPath: /etc/vector/vector.yaml
              subPath: vector.yaml
            # ES CA certificate for TLS verification.
            - name: es-certs
              mountPath: /etc/vector/certs
              readOnly: true

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          securityContext:
            allowPrivilegeEscalation: false

      volumes:
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: Directory
        # DirectoryOrCreate: creates /var/lib/vector on the node if absent.
        - name: vector-data
          hostPath:
            path: /var/lib/vector
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: vector-config
        - name: es-certs
          secret:
            secretName: vector-es-secret
            items:
              - key: http_ca.crt
                path: http_ca.crt
