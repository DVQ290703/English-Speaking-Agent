# Vector configuration — tails app log files, parses JSON spans, routes to data streams

sources:
  app_logs:
    type: file
    include:
      - /logs/*.log
    read_from: beginning

transforms:
  parse_json_logs:
    type: remap
    inputs:
      - app_logs
    source: |
      # Log line format: "2026-05-07 10:23:45 INFO     [AI-Lab-Agent]: <message>"
      parsed, err = parse_regex(.message, r'^\S+ \S+ \S+\s+\[\S+\]:\s+(?P<payload>.+)$')
      if err == null {
        json_payload, json_err = parse_json(parsed.payload)
        if json_err == null && is_object(json_payload) {
          . = merge!(., json_payload)
          .log_type = "span"
        } else {
          .log_type = "plain"
          .raw_message = parsed.payload
        }
      } else {
        .log_type = "plain"
        .raw_message = .message
      }
      .source_file = .file

  route_by_category:
    type: route
    inputs:
      - parse_json_logs
    route:
      audit: exists(.event_type)
      span: .log_type == "span" && !exists(.event_type)
      plain: .log_type == "plain"

sinks:
  elasticsearch_audit:
    type: elasticsearch
    inputs:
      - route_by_category.audit
    endpoints:
      - http://elasticsearch:9200
    mode: data_stream
    data_stream:
      type: logs
      dataset: voice_agent.audit
      namespace: default
    encoding:
      except_fields:
        - file
        - host
        - source_type

  elasticsearch_spans:
    type: elasticsearch
    inputs:
      - route_by_category.span
    endpoints:
      - http://elasticsearch:9200
    mode: data_stream
    data_stream:
      type: logs
      dataset: voice_agent.spans
      namespace: default
    encoding:
      except_fields:
        - file
        - host
        - source_type

  elasticsearch_plain:
    type: elasticsearch
    inputs:
      - route_by_category.plain
    endpoints:
      - http://elasticsearch:9200
    mode: data_stream
    data_stream:
      type: logs
      dataset: voice_agent.plain
      namespace: default
    encoding:
      except_fields:
        - file
        - host
        - source_type
