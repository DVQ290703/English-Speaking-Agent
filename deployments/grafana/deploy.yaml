# =============================================================================
# Grafana Deployment — English Speaking Agent
# Apply  : kubectl apply -f deployments/grafana/deploy.yaml
#          kubectl apply -f deployments/grafana/dashboard-configmap.yaml
# Status : kubectl get pods -l app=grafana -n english-speaking-agent
#
# Two ConfigMaps are provisioned at startup:
#   1. grafana-datasource-config  — points at the in-cluster Prometheus service
#   2. grafana-dashboard-provider — tells Grafana where to load dashboards from
#
# Dashboard JSON lives in dashboard-configmap.yaml (generated from
# provisioning/dashboards/json/voice-agent-pipeline.json). Apply that file
# separately whenever the dashboard JSON changes.
# =============================================================================

# ── ConfigMap 1: Datasource ───────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-config
  namespace: english-speaking-agent
  labels:
    app: grafana
    tier: monitoring
    project: english-speaking-agent
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        jsonData:
          timeInterval: "15s"

---

# ── ConfigMap 2: Dashboard provider ──────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: english-speaking-agent
  labels:
    app: grafana
    tier: monitoring
    project: english-speaking-agent
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards

---

# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: english-speaking-agent
  labels:
    app: grafana
    tier: monitoring
    project: english-speaking-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
      tier: monitoring
  template:
    metadata:
      labels:
        app: grafana
        tier: monitoring
        project: english-speaking-agent
    spec:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      securityContext:
        fsGroup: 472   # grafana GID

      containers:
        - name: grafana
          image: grafana/grafana:10.4.0

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: GRAFANA_ADMIN_PASSWORD
                  optional: true
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "https://vinai-speaking-agent.duckdns.org/grafana"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"

          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana

          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 472   # grafana user

      volumes:
        - name: datasources
          configMap:
            name: grafana-datasource-config
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-voice-agent
        - name: data
          emptyDir: {}

---

# ── Service ───────────────────────────────────────────────────────────────────
# ClusterIP: ingress proxies /grafana/* to this service.
# Create the admin password secret once with:
#   kubectl patch secret backend-secret -n english-speaking-agent \
#     --type='merge' \
#     -p '{"stringData": {"GRAFANA_ADMIN_PASSWORD": "your-secure-password"}}'
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: english-speaking-agent
  labels:
    app: grafana
    tier: monitoring
    project: english-speaking-agent
spec:
  type: ClusterIP
  selector:
    app: grafana
    tier: monitoring
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http
