# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: english-speaking-agent
  labels:
    app: grafana
    tier: monitoring
    project: english-speaking-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
      tier: monitoring
  template:
    metadata:
      labels:
        app: grafana
        tier: monitoring
        project: english-speaking-agent
    spec:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      securityContext:
        fsGroup: 472   # grafana GID

      containers:
        - name: grafana
          image: grafana/grafana:10.4.0

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: GRAFANA_ADMIN_PASSWORD
                  optional: true
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "https://vinai-speaking-agent.duckdns.org/grafana"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"

          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana

          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 472   # grafana user

      volumes:
        - name: datasources
          configMap:
            name: grafana-datasource-config
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-voice-agent
        - name: data
          emptyDir: {}

---

# ── Service ───────────────────────────────────────────────────────────────────
# ClusterIP: ingress proxies /grafana/* to this service.
# Create the admin password secret once with:
#   kubectl patch secret backend-secret -n english-speaking-agent \
#     --type='merge' \
#     -p '{"stringData": {"GRAFANA_ADMIN_PASSWORD": "your-secure-password"}}'
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: english-speaking-agent
  labels:
    app: grafana
    tier: monitoring
    project: english-speaking-agent
spec:
  type: ClusterIP
  selector:
    app: grafana
    tier: monitoring
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http
