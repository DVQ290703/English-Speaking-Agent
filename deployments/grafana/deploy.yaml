# =============================================================================
# Grafana Deployment — English Speaking Agent
# Apply  : kubectl apply -f deployments/grafana/deploy.yaml
# Status : kubectl get pods -l app=grafana -n english-speaking-agent
#
# Three ConfigMaps are provisioned at startup:
#   1. grafana-datasource-config  — points at the in-cluster Prometheus service
#   2. grafana-dashboard-provider — tells Grafana where to load dashboards from
#   3. grafana-dashboard-voice-agent — the Voice Agent pipeline dashboard JSON
# =============================================================================

# ── ConfigMap 1: Datasource ───────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-config
  namespace: english-speaking-agent
  labels:
    app: grafana
    tier: monitoring
    project: english-speaking-agent
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        jsonData:
          timeInterval: "15s"

---

# ── ConfigMap 2: Dashboard provider ──────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: english-speaking-agent
  labels:
    app: grafana
    tier: monitoring
    project: english-speaking-agent
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards

---

