name: Backend Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest · Python 3.10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv --quiet

      - name: Install production dependencies
        run: uv pip install -r requirements.txt --system --quiet

      - name: Install test dependencies
        run: uv pip install -r requirements-test.txt --system --quiet

      - name: Run test suite
        run: python -m pytest tests/ --tb=short
        env:
          # pytest tự set defaults cho các biến này trong conftest.py
          # Chỉ cần override JWT_SECRET_KEY để đủ 32 bytes trên CI
          JWT_SECRET_KEY: "ci-test-secret-key-for-github-ci!"

      - name: Upload coverage report (optional)
        if: always()
        run: |
          python -m pip install pytest-cov --quiet
          python -m pytest tests/ --cov=app --cov-report=xml --quiet
        continue-on-error: true
