# =============================================================================
# GitLab CI/CD Pipeline — English Speaking Agent
#
# Stages:
#   test   — pytest (always runs on main, gates build + deploy)
#   build  — Kaniko builds backend and/or frontend (path-filtered)
#   deploy — gcloud auth via Service Account key + kubectl apply
#
# Required GitLab CI Variables (Settings → CI/CD → Variables):
#   HARBOR_USER                    — Harbor registry username
#   HARBOR_PASSWORD                — Harbor registry password        (masked)
#   GCP_PROJECT_ID                 — GCP project ID  e.g. vinuniai
#   GCP_WORKLOAD_IDENTITY_PROVIDER — full provider resource name
#     format: projects/<NUMBER>/locations/global/workloadIdentityPools/<POOL>/providers/<PROVIDER>
#   GCP_SERVICE_ACCOUNT            — SA email e.g. gitlab-deployer@vinuniai.iam.gserviceaccount.com
#   GKE_CLUSTER_NAME               — e.g. vinai-cluster
#   GKE_CLUSTER_ZONE               — e.g. us-central1-a
#
# Auth: CI_JOB_JWT_V2 (predefined, no config needed) + GCP Workload Identity Federation
# No SA keys stored — org policy constraints/iam.disableServiceAccountKeyCreation enforced.
# =============================================================================

variables:
  HARBOR_REGISTRY: "vinai-registry.duckdns.org"
  HARBOR_PROJECT:  "english-speaking-agent"
  IMAGE_BACKEND:   "vinai-registry.duckdns.org/english-speaking-agent/backend"
  IMAGE_FRONTEND:  "vinai-registry.duckdns.org/english-speaking-agent/frontend"
  CACHE_REPO:      "vinai-registry.duckdns.org/english-speaking-agent/cache"
  K8S_NAMESPACE:   "english-speaking-agent"

stages:
  - test
  - build
  - deploy

