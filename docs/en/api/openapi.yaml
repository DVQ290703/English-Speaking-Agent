openapi: 3.1.0
info:
  title: AI Speaking Coach API
  description: REST API for the IELTS Speaking Assistant. Provides voice-based conversation
    practice, pronunciation assessment, grammar feedback, and spaced-repetition flashcards.
    All endpoints except `/health` require a Bearer JWT obtained via POST /api/auth/login.
  version: 1.0.0
paths:
  /metrics:
    get:
      summary: Metrics
      description: Endpoint that serves Prometheus metrics.
      operationId: metrics_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health:
    get:
      summary: Health Check
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/auth/login:
    post:
      tags:
      - auth
      summary: Login
      description: Authenticate with email/password; return a JWT and user profile.
        Raises 401 on bad credentials.
      operationId: login_api_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/forgot-password:
    post:
      tags:
      - auth
      summary: Forgot Password
      description: Generate a password reset token for local-password accounts and
        return a generic response.
      operationId: forgot_password_api_auth_forgot_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgotPasswordResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/me:
    get:
      tags:
      - auth
      summary: Me
      description: Return the profile of the currently authenticated user. Raises
        401 if token is invalid or user is inactive.
      operationId: me_api_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
      security:
      - HTTPBearer: []
  /api/auth/register:
    post:
      tags:
      - auth
      summary: Register
      description: Register a new account and return a JWT. Raises 400 if the email
        is taken or the password fails policy.
      operationId: register_api_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/reset-password:
    post:
      tags:
      - auth
      summary: Reset Password
      description: Reset a user's password using a one-time token.
      operationId: reset_password_api_auth_reset_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/change-password:
    post:
      tags:
      - auth
      summary: Change Password
      description: Change the authenticated user's password after verifying their
        current password.
      operationId: change_password_api_auth_change_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/auth/oauth/login/{provider}:
    get:
      tags:
      - oauth
      summary: Oauth Login
      operationId: oauth_login_api_auth_oauth_login__provider__get
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          title: Provider
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/oauth/{provider}/callback:
    get:
      tags:
      - oauth
      summary: Oauth Callback
      operationId: oauth_callback_api_auth_oauth__provider__callback_get
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          title: Provider
      - name: code
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Code
      - name: state
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: State
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/chat/transcribe:
    post:
      tags:
      - chat
      summary: Transcribe an uploaded audio file to text (STT only, no LLM)
      description: 'Lightweight STT-only endpoint: transcribes audio via Groq Whisper.

        No LLM, no TTS, no database writes — optimised for low-latency transcription.'
      operationId: transcribe_audio_only_api_chat_transcribe_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_transcribe_audio_only_api_chat_transcribe_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/chat/respond:
    post:
      tags:
      - chat
      summary: Send a message and receive an AI response with optional TTS audio
      description: 'Send a message (text or audio) and get an AI coach reply with
        TTS audio.


        Audio input is transcribed via STT when no text is provided. Input and output

        pass through guardrails. A new conversation is created if conversation_id
        is

        omitted; category is matched to a topics row to enforce the 5-session limit.

        Returns the reply text, inline or URL-referenced MP3, and a grammar summary.'
      operationId: chat_respond_api_chat_respond_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_chat_respond_api_chat_respond_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/assess:
    post:
      tags:
      - assessment
      summary: Assess Pronunciation
      description: 'Score pronunciation via Azure. Scripted mode (with reference_text)
        gives word/phoneme error detail;

        unscripted mode freely recognizes speech. Result is persisted and linked to
        message_id when provided.'
      operationId: assess_pronunciation_api_assess_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_assess_pronunciation_api_assess_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/conversations:
    get:
      tags:
      - conversations
      summary: List Conversations
      operationId: list_conversations_api_conversations_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListResponse'
      security:
      - HTTPBearer: []
  /api/conversations/for-topic:
    get:
      tags:
      - conversations
      summary: Get Conversations For Topic
      description: Return up to 5 non-deleted conversations for a topic, latest-first,
        with session numbers and limit flag.
      operationId: get_conversations_for_topic_api_conversations_for_topic_get
      security:
      - HTTPBearer: []
      parameters:
      - name: topic_code
        in: query
        required: true
        schema:
          type: string
          title: Topic Code
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForTopicResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/conversations/stats:
    get:
      tags:
      - conversations
      summary: Get Conversation Stats
      description: Return per-conversation stats (scores, duration, message count)
        for the dashboard, latest 200.
      operationId: get_conversation_stats_api_conversations_stats_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationStatsResponse'
      security:
      - HTTPBearer: []
  /api/conversations/{conversation_id}/clear:
    post:
      tags:
      - conversations
      summary: Clear Conversation History
      description: Hide all prior messages by setting cleared_at = NOW(). Data is
        retained; returns 204.
      operationId: clear_conversation_history_api_conversations__conversation_id__clear_post
      security:
      - HTTPBearer: []
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Conversation Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/conversations/{conversation_id}:
    delete:
      tags:
      - conversations
      summary: Delete Conversation
      description: Soft-delete a conversation (sets deleted_at). Frees up the per-topic
        session slot; data is retained.
      operationId: delete_conversation_api_conversations__conversation_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Conversation Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - conversations
      summary: Update Conversation
      description: 'Mark a conversation as finished by setting ended_at = NOW().

        This enables duration calculation for dashboard statistics.'
      operationId: update_conversation_api_conversations__conversation_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Conversation Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/conversations/{conversation_id}/messages-with-scores:
    get:
      tags:
      - conversations
      summary: Get Conversation Messages With Scores
      description: Return visible messages with embedded pronunciation scores and
        word/phoneme breakdowns.
      operationId: get_conversation_messages_with_scores_api_conversations__conversation_id__messages_with_scores_get
      security:
      - HTTPBearer: []
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          title: Conversation Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationWithScoresResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/audio/{storage_key}:
    get:
      tags:
      - audio
      summary: Stream a stored audio file from MinIO (requires auth, 1-hour cache)
      description: 'Stable audio proxy — streams a MinIO object to the client.

        Uses a stable URL (not a presigned URL) so the browser can cache the response.

        Auth is required.'
      operationId: stream_audio_api_audio__storage_key__get
      security:
      - HTTPBearer: []
      parameters:
      - name: storage_key
        in: path
        required: true
        schema:
          type: string
          title: Storage Key
      responses:
        '200':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/grammar/detail_grammar_fb/{message_id}:
    get:
      tags:
      - grammar
      summary: Get Grammar Detail
      description: Return grammar errors, corrections, and overall score for a user
        message. Raises 404 if not found or not owned.
      operationId: get_grammar_detail_api_grammar_detail_grammar_fb__message_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: string
          title: Message Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrammarDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/topics/get_categories_topics:
    get:
      tags:
      - topics
      summary: List Categories
      description: Return all active categories with their active topics, ordered
        by sort_order.
      operationId: list_categories_api_topics_get_categories_topics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/CategoryWithTopicsOut'
                type: array
                title: Response List Categories Api Topics Get Categories Topics Get
  /api/flashcards/decks:
    get:
      tags:
      - flashcards
      summary: List Decks
      description: Return all active decks for the current user with card count and
        due count.
      operationId: list_decks_api_flashcards_decks_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DeckOut'
                type: array
                title: Response List Decks Api Flashcards Decks Get
      security:
      - HTTPBearer: []
    post:
      tags:
      - flashcards
      summary: Create Deck
      description: Create a new flashcard deck for the current user.
      operationId: create_deck_api_flashcards_decks_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeckOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/flashcards/decks/{deck_id}:
    get:
      tags:
      - flashcards
      summary: Get Deck
      description: Fetch a single deck by ID with live card and due counts.
      operationId: get_deck_api_flashcards_decks__deck_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: deck_id
        in: path
        required: true
        schema:
          type: string
          title: Deck Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeckOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - flashcards
      summary: Update Deck
      description: Partially update a deck's name or description. Omitted fields are
        unchanged.
      operationId: update_deck_api_flashcards_decks__deck_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: deck_id
        in: path
        required: true
        schema:
          type: string
          title: Deck Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeckOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - flashcards
      summary: Delete Deck
      description: Soft-delete a deck. All its cards are effectively hidden but not
        purged.
      operationId: delete_deck_api_flashcards_decks__deck_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: deck_id
        in: path
        required: true
        schema:
          type: string
          title: Deck Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/flashcards/cards/search:
    get:
      tags:
      - flashcards
      summary: Search Cards
      description: Search cards by keyword (ILIKE on front/back text) and/or tag.
        Returns up to 50 results.
      operationId: search_cards_api_flashcards_cards_search_get
      security:
      - HTTPBearer: []
      parameters:
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Q
      - name: tag
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Tag
      - name: deck_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Deck Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CardOut'
                title: Response Search Cards Api Flashcards Cards Search Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/flashcards/decks/{deck_id}/cards:
    get:
      tags:
      - flashcards
      summary: List Cards
      description: List active cards in a deck, ordered by creation date descending.
        Supports pagination.
      operationId: list_cards_api_flashcards_decks__deck_id__cards_get
      security:
      - HTTPBearer: []
      parameters:
      - name: deck_id
        in: path
        required: true
        schema:
          type: string
          title: Deck Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CardOut'
                title: Response List Cards Api Flashcards Decks  Deck Id  Cards Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - flashcards
      summary: Create Card
      description: Create a card with text fields only. Use create_card_with_media
        to attach files.
      operationId: create_card_api_flashcards_decks__deck_id__cards_post
      security:
      - HTTPBearer: []
      parameters:
      - name: deck_id
        in: path
        required: true
        schema:
          type: string
          title: Deck Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/flashcards/decks/{deck_id}/cards/with-media:
    post:
      tags:
      - flashcards
      summary: Create Card With Media
      description: "Create a card with optional media attachments in a single multipart\
        \ request.\n\nSend as multipart/form-data:\n- front_text, back_text, tags[]\
        \ — card fields\n- files[], sides[], media_types[] — parallel arrays, one\
        \ entry per file\n  - sides[i]: \"front\" | \"back\"\n  - media_types[i]:\
        \ \"image\" | \"audio\"\n\nFile bytes are validated and read before the DB\
        \ transaction opens to avoid\nholding a connection during slow I/O. All inserts\
        \ (card + media) are atomic."
      operationId: create_card_with_media_api_flashcards_decks__deck_id__cards_with_media_post
      security:
      - HTTPBearer: []
      parameters:
      - name: deck_id
        in: path
        required: true
        schema:
          type: string
          title: Deck Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_create_card_with_media_api_flashcards_decks__deck_id__cards_with_media_post'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/flashcards/cards/{card_id}:
    get:
      tags:
      - flashcards
      summary: Get Card
      description: Fetch a single card by ID, including all attached media with presigned
        URLs.
      operationId: get_card_api_flashcards_cards__card_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: card_id
        in: path
        required: true
        schema:
          type: string
          title: Card Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - flashcards
      summary: Update Card
      description: Partially update a card's front text, back text, or tags. Omitted
        fields are unchanged.
      operationId: update_card_api_flashcards_cards__card_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: card_id
        in: path
        required: true
        schema:
          type: string
          title: Card Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - flashcards
      summary: Delete Card
      description: Soft-delete a card. Its review schedule is preserved but the card
        is excluded from all queries.
      operationId: delete_card_api_flashcards_cards__card_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: card_id
        in: path
        required: true
        schema:
          type: string
          title: Card Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/flashcards/reviews/due:
    get:
      tags:
      - flashcards
      summary: Get Due Cards
      description: Return cards due for review today, ordered by due date ascending.
        Optionally filtered by deck.
      operationId: get_due_cards_api_flashcards_reviews_due_get
      security:
      - HTTPBearer: []
      parameters:
      - name: deck_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Deck Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DueCardOut'
                title: Response Get Due Cards Api Flashcards Reviews Due Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/flashcards/reviews/{card_id}:
    post:
      tags:
      - flashcards
      summary: Submit Review
      description: 'Submit a review rating for a card. Applies the SM-2 algorithm
        and persists the new schedule.


        Idempotent: re-submitting on the same day overwrites the previous rating.'
      operationId: submit_review_api_flashcards_reviews__card_id__post
      security:
      - HTTPBearer: []
      parameters:
      - name: card_id
        in: path
        required: true
        schema:
          type: string
          title: Card Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewSubmit'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewStateOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/flashcards/decks/{deck_id}/stats:
    get:
      tags:
      - flashcards
      summary: Get Deck Stats
      description: 'Return aggregate stats for a deck: total cards, due today, learned,
        and 30-day retention rate.'
      operationId: get_deck_stats_api_flashcards_decks__deck_id__stats_get
      security:
      - HTTPBearer: []
      parameters:
      - name: deck_id
        in: path
        required: true
        schema:
          type: string
          title: Deck Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeckStatsOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/flashcards/cards/{card_id}/media:
    post:
      tags:
      - flashcards
      summary: Upload Card Media
      description: Upload a single image or audio file and attach it to a card side
        (front or back).
      operationId: upload_card_media_api_flashcards_cards__card_id__media_post
      security:
      - HTTPBearer: []
      parameters:
      - name: card_id
        in: path
        required: true
        schema:
          type: string
          title: Card Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_card_media_api_flashcards_cards__card_id__media_post'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/flashcards/media/{media_id}:
    delete:
      tags:
      - flashcards
      summary: Delete Card Media
      description: Delete a media item and remove its file from storage. Verifies
        ownership via the parent card.
      operationId: delete_card_media_api_flashcards_media__media_id__delete
      security:
